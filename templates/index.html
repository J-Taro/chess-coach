<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Chess Coach</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
  * { box-sizing: border-box; }
  body { font-family: sans-serif; background: #1a1a2e; color: #eee; margin: 0; }

  #lobby {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 20px; padding: 32px;
  }
  h1 { font-size: 32px; margin: 0; }
  .subtitle { color: #aaa; margin: 0; }
  .card {
    background: #16213e; border-radius: 12px; padding: 20px;
    width: 360px; display: flex; flex-direction: column; gap: 10px;
  }
  .card h2 { margin: 0 0 4px; font-size: 15px; color: #a8d8a8; }
  input[type=text], input[type=number] {
    padding: 9px; font-size: 14px; border-radius: 8px;
    border: 1px solid #444; background: #0f3460; color: #eee; width: 100%;
  }
  #lobby-msg { color: #aaa; font-size: 14px; text-align: center; min-height: 20px; }

  .time-presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn {
    padding: 6px 12px; font-size: 13px; border: 1px solid #444;
    border-radius: 8px; cursor: pointer; background: #0f3460; color: #eee;
    font-weight: normal; width: auto;
  }
  .preset-btn.active { background: #4a90d9; border-color: #4a90d9; }
  .custom-time { display: flex; gap: 8px; align-items: center; font-size: 13px; color: #aaa; }
  .custom-time input { width: 70px; }

  #game { display: none; flex-direction: row; gap: 24px; padding: 24px; align-items: flex-start; }
  #board { width: 480px; flex-shrink: 0; }
  #panel { flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 220px; }
  #status { font-size: 17px; font-weight: bold; color: #a8d8a8; }
  #room-info { font-size: 13px; color: #aaa; }
  #last-move { font-size: 13px; color: #aaa; }

  .clock-row { display: flex; justify-content: space-between; gap: 10px; }
  .clock-box {
    flex: 1; background: #16213e; border-radius: 10px; padding: 10px;
    text-align: center;
  }
  .clock-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
  .clock-time { font-size: 22px; font-weight: bold; font-family: monospace; }
  .clock-box.active .clock-time { color: #a8d8a8; }
  .clock-box.low .clock-time { color: #e07b3a; }

  #analysis-box {
    background: #16213e; border-radius: 10px; padding: 14px;
    min-height: 100px; font-size: 13px; line-height: 1.7; color: #ddd;
  }
  #loading { color: #aaa; font-style: italic; display: none; font-size: 13px; }
  .highlight-square::after {
    content: ""; display: block; width: 30%; height: 30%;
    border-radius: 50%; background: rgba(0,0,0,0.25); margin: 35% auto;
  }

  button {
    padding: 10px 16px; font-size: 14px; border: none;
    border-radius: 8px; cursor: pointer; font-weight: bold;
  }
  .btn-blue { background: #4a90d9; color: white; width: 100%; }
  .btn-blue:hover { background: #357abd; }
  .btn-green { background: #5a9e6f; color: white; width: 100%; }
  .btn-green:hover { background: #3d7a52; }
  .btn-orange { background: #e07b3a; color: white; width: 100%; }
  .btn-orange:hover { background: #b85e25; }
  .btn-gray { background: #555; color: white; width: 100%; }
  .btn-gray:hover { background: #333; }
  .btn-purple { background: #7b5ea7; color: white; width: 100%; }
  .btn-purple:hover { background: #5e4080; }

  /* 训练模式：教练按钮锁定状态 */
  #btn-analyze:disabled {
    background: #333; color: #666; cursor: not-allowed;
  }

  /* 难度选择 */
  .difficulty-row { display: flex; gap: 6px; }
  .diff-btn {
    flex: 1; padding: 7px 4px; font-size: 12px; border: 1px solid #444;
    border-radius: 8px; cursor: pointer; background: #0f3460; color: #eee;
    font-weight: normal; text-align: center;
  }
  .diff-btn.active { background: #7b5ea7; border-color: #7b5ea7; }

  /* 对局结束复盘提示 */
  #review-hint {
    background: #1e3a5f; border-radius: 10px; padding: 12px;
    font-size: 13px; color: #a8d8a8; display: none; text-align: center;
  }

  /* 走法记录 */
  #move-log {
    background: #16213e; border-radius: 10px; padding: 10px;
    font-size: 12px; color: #aaa; max-height: 120px; overflow-y: auto;
    font-family: monospace; line-height: 1.8; display: none;
  }
  .move-step {
    cursor: pointer; padding: 1px 4px; border-radius: 4px;
  }
  .move-step:hover { background: #2a3f6f; color: #fff; }
  .move-step.active { background: #4a90d9; color: #fff; }
  #replay-hint {
    font-size: 11px; color: #666; text-align: center; display: none;
  }
</style>
</head>
<body>

<div id="lobby">
  <h1>♟️ Chess Coach</h1>
  <p class="subtitle">国际象棋 AI 教练</p>

  <div style="display:flex;gap:16px;width:100%;max-width:760px">
    <!-- 对战 Stockfish（训练模式） -->
    <div class="card" style="flex:1">
      <h2>🤖 训练模式 · 对战引擎</h2>
      <p style="font-size:12px;color:#aaa;margin:0">对局中教练不介入，结束后复盘分析</p>
      <div style="font-size:12px;color:#aaa;margin-top:4px">难度</div>
      <div class="difficulty-row">
        <div class="diff-btn active" data-depth="3">入门</div>
        <div class="diff-btn" data-depth="6">初级</div>
        <div class="diff-btn" data-depth="10">中级</div>
        <div class="diff-btn" data-depth="15">高级</div>
      </div>
      <div style="font-size:12px;color:#aaa;margin-top:4px">执棋颜色</div>
      <div style="display:flex;gap:8px">
        <button class="preset-btn active" id="sf-color-white" style="flex:1">♔ 白方</button>
        <button class="preset-btn" id="sf-color-black" style="flex:1">♚ 黑方</button>
      </div>
      <button class="btn-purple" id="btn-vs-stockfish">开始训练</button>
    </div>

    <!-- 单人模式 -->
    <div class="card" style="flex:1">
      <h2>✏️ 学习模式 · 自由练习</h2>
      <p style="font-size:12px;color:#aaa;margin:0">自己操控双方，随时可以问教练</p>
      <button class="btn-blue" id="btn-solo" style="margin-top:auto">Solo Mode</button>
    </div>
  </div>

  <div style="display:flex;gap:16px;width:100%;max-width:760px">
    <div class="card" style="flex:1">
      <h2>FEN 局面分析</h2>
      <input type="text" id="fen-input" placeholder="粘贴 FEN 字符串">
      <button class="btn-blue" id="btn-fen-analyze">分析局面</button>
      <div id="fen-result" style="font-size:13px;color:#aaa;line-height:1.6;display:none"></div>
    </div>
  </div>
  
  <div style="display:flex;gap:16px;width:100%;max-width:760px">
    <div class="card" style="flex:1">
      <h2>创建房间</h2>
      <div style="display:flex;gap:8px">
        <button class="preset-btn active" id="color-random" style="flex:1">随机</button>
        <button class="preset-btn" id="color-white" style="flex:1">♔ 白方</button>
        <button class="preset-btn" id="color-black" style="flex:1">♚ 黑方</button>
      </div>
      <button class="btn-blue" id="btn-create">创建新房间</button>
    </div>
    <div class="card" style="flex:1">
      <h2>加入房间</h2>
      <input type="text" id="room-input" placeholder="输入房间码" maxlength="6" style="text-transform:uppercase">
      <button class="btn-orange" id="btn-join">加入</button>
    </div>
  </div>
  
  <div style="width:100%;max-width:760px">
    <div class="card">
      <h2>快速匹配</h2>
      <button class="btn-green" id="btn-quick">快速匹配对手</button>
    </div>
  </div>

  <div id="lobby-msg"></div>
</div>

<div id="game">
  <div><div id="board"></div></div>
  <div id="panel">
    <div id="room-info">房间码：<strong id="room-code"></strong> · 你是 <strong id="my-color"></strong></div>
    <div id="status">等待对手加入...</div>
    <div class="clock-row" id="clock-row" style="display:none">
      <div class="clock-box" id="clock-black">
        <div class="clock-label">黑方</div>
        <div class="clock-time" id="time-black">--:--</div>
      </div>
      <div class="clock-box" id="clock-white">
        <div class="clock-label">白方</div>
        <div class="clock-time" id="time-white">--:--</div>
      </div>
    </div>
    <div id="last-move">上一步：—</div>

    <!-- 走法记录（训练模式显示） -->
    <div id="move-log"></div>
    <div id="replay-hint">点击任意走法跳转局面 · 点空白处恢复当前</div>

    <!-- 训练模式：对局结束提示 -->
    <div id="review-hint">
      🎓 对局结束！现在可以让教练复盘整局分析
    </div>

    <button class="btn-blue" id="btn-analyze">🎓 教练分析</button>
    <div id="loading">教练思考中...</div>
    <div id="analysis-box">点击「教练分析」获取建议</div>
    <button class="btn-gray" id="btn-home">返回首页</button>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/socket.io@4.7.5/client-dist/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const socket = io()
  const savedCode = sessionStorage.getItem("roomCode")
  const savedColor = sessionStorage.getItem("myColor")
  if (savedCode && savedColor) {
      socket.emit("reconnect_room", { code: savedCode, color: savedColor })
  }
  const game = new Chess()
  let myColor = "white"
  let roomCode = ""
  let lastMove = ""
  let gameStarted = false
  let board = null
  let unlimited = true
  let increment = 0
  let clocks = { white: 0, black: 0 }
  let clockInterval = null
  let moveStartTime = null

  // 训练模式状态
  let isTrainingMode = false
  let stockfishDepth = 3
  let stockfishThinking = false
  let moveHistory = []  // 存每步 {uci, fen, score} 用于复盘

  // 难度按钮
  $(".diff-btn").click(function() {
    $(".diff-btn").removeClass("active")
    $(this).addClass("active")
    stockfishDepth = parseInt($(this).data("depth"))
  })

  // 执棋颜色选择（Stockfish 对战）
  let sfPlayerColor = "white"
  $("#sf-color-white, #sf-color-black").click(function() {
    $("#sf-color-white, #sf-color-black").removeClass("active")
    $(this).addClass("active")
    sfPlayerColor = $(this).attr("id") === "sf-color-white" ? "white" : "black"
  })

  // 颜色选择（房间）
  let selectedColor = "random"
  $("#color-random, #color-white, #color-black").click(function() {
    $("#color-random, #color-white, #color-black").removeClass("active")
    $(this).addClass("active")
    selectedColor = $(this).attr("id").replace("color-", "")
  })

  let selectedMin = 0, selectedInc = 0
  $(".time-presets .preset-btn").click(function() {
    $(".time-presets .preset-btn").removeClass("active")
    $(this).addClass("active")
    selectedMin = parseInt($(this).data("min"))
    selectedInc = parseInt($(this).data("inc"))
    if (selectedMin === -1) {
      $("#custom-row").show()
    } else {
      $("#custom-row").hide()
    }
  })

  function getTimeControl() {
    return { minutes: 0, increment: 0 }
  }

  function formatTime(seconds) {
    if (seconds <= 0) return "00:00"
    const m = Math.floor(seconds / 60)
    const s = Math.floor(seconds % 60)
    return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
  }

  function updateClocks() {
    $("#time-white").text(formatTime(clocks.white))
    $("#time-black").text(formatTime(clocks.black))
    const turn = game.turn() === "w" ? "white" : "black"
    $("#clock-white").toggleClass("active", turn === "white" && gameStarted)
    $("#clock-black").toggleClass("active", turn === "black" && gameStarted)
    $("#clock-white").toggleClass("low", clocks.white < 30 && clocks.white > 0)
    $("#clock-black").toggleClass("low", clocks.black < 30 && clocks.black > 0)
  }

  function startClock(serverTime) {
        if (unlimited || !gameStarted) return
        clearInterval(clockInterval)
        const localOffset = serverTime ? (Date.now() - serverTime * 1000) : 0
        moveStartTime = Date.now() - localOffset
        clockInterval = setInterval(() => {
            const turn = game.turn() === "w" ? "white" : "black"
            const elapsed = (Date.now() - moveStartTime) / 1000
            const displayClocks = {
                white: turn === "white" ? Math.max(0, clocks.white - elapsed) : clocks.white,
                black: turn === "black" ? Math.max(0, clocks.black - elapsed) : clocks.black
            }
            $("#time-white").text(formatTime(displayClocks.white))
            $("#time-black").text(formatTime(displayClocks.black))
            $("#clock-white").toggleClass("active", turn === "white" && gameStarted)
            $("#clock-black").toggleClass("active", turn === "black" && gameStarted)
            $("#clock-white").toggleClass("low", displayClocks.white < 30)
            $("#clock-black").toggleClass("low", displayClocks.black < 30)
            if (displayClocks[turn] <= 0 && turn === myColor) {
                clearInterval(clockInterval)
                socket.emit("timeout", { room: roomCode, color: myColor })
            }
        }, 100)
  }

  function stopClock() {
    clearInterval(clockInterval)
  }

function readSSE(response, onChunk, onDone) {
    const reader = response.body.getReader()
    const decoder = new TextDecoder()
    let tail = ""

    async function pump() {
        while (true) {
            const { done, value } = await reader.read()
            if (done) { onDone(); return }
            tail += decoder.decode(value)
            const lines = tail.split("\n")
            tail = lines.pop()
            lines.forEach(line => {
                if (line.startsWith("data: ")) {
                    const chunk = line.slice(6)
                    if (chunk !== "[DONE]") onChunk(chunk)
                }
            })
        }
    }
    pump()
}

  function initBoard() {
    if (board) board.destroy()
    board = Chessboard("board", {
      draggable: true,
      position: "start",
      orientation: myColor,
      pieceTheme: "https://lichess1.org/assets/piece/cburnett/{piece}.svg",
      onDragStart: (source, piece) => {
        if (!gameStarted || game.game_over()) return false
        if (myColor === "white" && piece.search(/^b/) !== -1) return false
        if (myColor === "black" && piece.search(/^w/) !== -1) return false
        if (game.turn() === "w" && myColor !== "white") return false
        if (game.turn() === "b" && myColor !== "black") return false
        if (stockfishThinking) return false  // Stockfish 走棋时不能操作
        highlightMoves(source)
      },
      onDrop: (source, target) => {
        removeHighlights()
        const move = game.move({ from: source, to: target, promotion: "q" })
        if (move === null) return "snapback"
        lastMove = source + target
        if (roomCode === "STOCKFISH") {
          updateMoveLog(lastMove)
          updateStatus()
          if (!game.game_over()) {
            doStockfishMove()
          } else {
            onGameOver()
          }
        } else {
          socket.emit("make_move", { room: roomCode, move: lastMove })
          updateStatus()
        }
      },
      onSnapEnd: () => board.position(game.fen())
    })
  }

  // Stockfish 走棋
  async function doStockfishMove() {
    if (game.game_over()) { onGameOver(); return }
    stockfishThinking = true
    $("#status").text("引擎思考中...")

    try {
      const res = await fetch("/stockfish_move", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fen: game.fen(), depth: stockfishDepth })
      })
      const data = await res.json()
      if (data.move) {
        const move = game.move({ from: data.move.slice(0,2), to: data.move.slice(2,4), promotion: data.move[4] || "q" })
        if (move) {
          lastMove = data.move
          board.position(game.fen())
          updateMoveLog(lastMove, data.score)
          updateStatus()
          if (game.game_over()) {
            onGameOver()
          }
        }
      }
    } catch(e) {
      console.error("Stockfish error:", e)
    }
    stockfishThinking = false
  }

  function updateMoveLog(uci, score) {
    moveHistory.push({ uci, fen: game.fen(), score: score || "" })

    renderMoveLog()
  }

  function renderMoveLog(activeIdx) {
    let logHtml = ""
    for (let i = 0; i < moveHistory.length; i++) {
      const m = moveHistory[i]
      const num = Math.floor(i / 2) + 1
      const isWhiteMove = i % 2 === 0
      const label = isWhiteMove ? `${num}. ${m.uci}` : m.uci
      const isActive = i === activeIdx
      logHtml += `<span class="move-step${isActive ? ' active' : ''}" data-idx="${i}">${label}</span> `
    }
    $("#move-log").html(logHtml).scrollTop(9999)
    $("#replay-hint").toggle(moveHistory.length > 0)
  }

  // 点击走法跳转局面
  $(document).on("click", ".move-step", function(e) {
    e.stopPropagation()
    const idx = parseInt($(this).data("idx"))
    const entry = moveHistory[idx]
    if (!entry) return
    board.position(entry.fen, false)
    renderMoveLog(idx)
    const moveNum = Math.floor(idx / 2) + 1
    const side = idx % 2 === 0 ? "白方" : "黑方"
    $("#last-move").text(`第 ${moveNum} 步 · ${side} · ${entry.uci}`)
  })

  // 点击棋盘空白恢复当前局面
  $("#board").on("click", function() {
    if (moveHistory.length === 0) return
    board.position(game.fen(), false)
    renderMoveLog()
    $("#last-move").text("上一步：" + (lastMove || "—"))
  })

  function onGameOver() {
    gameStarted = false
    const result = game.in_checkmate() ? "将死！" : game.in_draw() ? "平局" : "游戏结束"
    $("#status").text(result)
    if (isTrainingMode) {
      // 解锁教练按钮，显示复盘提示
      $("#btn-analyze").prop("disabled", false).text("🎓 复盘分析")
      $("#review-hint").show()
      $("#analysis-box").html("对局结束，点击上方按钮让教练复盘整局")
    }
  }

  // Stockfish 对战入口
  $("#btn-vs-stockfish").click(() => {
    isTrainingMode = true
    roomCode = "STOCKFISH"
    myColor = sfPlayerColor
    moveHistory = []
    stockfishThinking = false

    $("#lobby").hide()
    $("#game").css("display", "flex")
    $("#room-code").text("引擎对战")
    $("#my-color").text(myColor === "white" ? "白方" : "黑方")
    $("#analysis-box").html("对局进行中，教练不介入。<br>对局结束后可以复盘。")
    $("#last-move").text("上一步：—")
    $("#clock-row").hide()
    $("#move-log").show()
    $("#review-hint").hide()
    lastMove = ""
    gameStarted = true
    game.reset()

    // 训练模式锁住教练按钮
    $("#btn-analyze").prop("disabled", true).text("🔒 对局结束后复盘")

    if (board) board.destroy()
    board = Chessboard("board", {
      draggable: true,
      position: "start",
      orientation: myColor,
      pieceTheme: "https://lichess1.org/assets/piece/cburnett/{piece}.svg",
      onDragStart: (source, piece) => {
        if (!gameStarted || game.game_over() || stockfishThinking) return false
        if (myColor === "white" && piece.search(/^b/) !== -1) return false
        if (myColor === "black" && piece.search(/^w/) !== -1) return false
        if (game.turn() === "w" && myColor !== "white") return false
        if (game.turn() === "b" && myColor !== "black") return false
        highlightMoves(source)
      },
      onDrop: (source, target) => {
        removeHighlights()
        const move = game.move({ from: source, to: target, promotion: "q" })
        if (move === null) return "snapback"
        lastMove = source + target
        updateMoveLog(lastMove)
        updateStatus()
        if (game.game_over()) { onGameOver(); return }
        setTimeout(() => doStockfishMove(), 300)  // 小延迟让棋子动画完成
      },
      onSnapEnd: () => board.position(game.fen())
    })

    updateStatus()

    // 如果玩家选黑，Stockfish 先走
    if (myColor === "black") {
      setTimeout(() => doStockfishMove(), 500)
    }
  })

  function showGame(code, color) {
    isTrainingMode = false
    roomCode = code
    myColor = color
    sessionStorage.setItem("roomCode", code)
    sessionStorage.setItem("myColor", color)
    $("#lobby").hide()
    $("#game").css("display", "flex")
    $("#room-code").text(code)
    $("#my-color").text(color === "white" ? "白方" : "黑方")
    $("#analysis-box").html("点击「教练分析」获取建议")
    $("#last-move").text("上一步：—")
    $("#clock-row").hide()
    $("#time-white").text("--:--")
    $("#time-black").text("--:--")
    $("#move-log").hide()
    $("#review-hint").hide()
    $("#btn-analyze").prop("disabled", false).text("🎓 教练分析")
    lastMove = ""
    gameStarted = false
    game.reset()
    stopClock()
    initBoard()
  }

  function removeHighlights() {
    $(".square-55d63").removeClass("highlight-square")
  }

  function highlightMoves(square) {
    removeHighlights()
    game.moves({ square, verbose: true }).forEach(m => $(".square-" + m.to).addClass("highlight-square"))
  }

  function updateStatus() {
    if (game.game_over()) { return }
    if (roomCode === "STOCKFISH") {
      const isMyTurn = (game.turn() === "w") === (myColor === "white")
      $("#status").text(isMyTurn ? "轮到你走棋" : "引擎思考中...")
    } else {
      const isMyTurn = (game.turn() === "w" && myColor === "white") ||
                       (game.turn() === "b" && myColor === "black")
      const turnText = game.turn() === "w" ? "白方" : "黑方"
      $("#status").text(isMyTurn ? "轮到你走棋" : `等待${turnText}走棋`)
    }
    $("#last-move").text("上一步：" + (lastMove || "—"))
  }

  // 单人模式
$("#btn-solo").click(() => {
    isTrainingMode = false
    roomCode = "SOLO"
    myColor = "white"
    $("#lobby").hide()
    $("#game").css("display", "flex")
    $("#room-code").text("单人练习")
    $("#my-color").text("白方先走")
    $("#analysis-box").html("点击「教练分析」获取建议")
    $("#last-move").text("上一步：—")
    $("#move-log").hide()
    $("#review-hint").hide()
    $("#btn-analyze").prop("disabled", false).text("🎓 教练分析")
    lastMove = ""
    gameStarted = true
    game.reset()
    stopClock()
    unlimited = true
    if (board) board.destroy()
    board = Chessboard("board", {
        draggable: true,
        position: "start",
        pieceTheme: "https://lichess1.org/assets/piece/cburnett/{piece}.svg",
        onDragStart: (source, piece) => {
            if (game.game_over()) return false
            highlightMoves(source)
            return true
        },
        onDrop: (source, target) => {
            removeHighlights()
            const move = game.move({ from: source, to: target, promotion: "q" })
            if (move === null) return "snapback"
            lastMove = source + target
            const turn = game.turn() === "w" ? "白方" : "黑方"
            $("#status").text(`轮到${turn}走棋`)
            $("#last-move").text("上一步：" + lastMove)
            myColor = game.turn() === "w" ? "white" : "black"
            $("#my-color").text(myColor === "white" ? "白方先走" : "黑方先走")
        },
        onSnapEnd: () => board.position(game.fen())
    })
    $("#status").text("轮到白方走棋")
})

// FEN 分析
$("#btn-fen-analyze").click(async () => {
    const fen = $("#fen-input").val().trim()
    if (!fen) { alert("请输入 FEN"); return }
    try { new Chess(fen) } catch(e) { alert("FEN 格式有误"); return }
    $("#fen-result").show().html("分析中...")

    let buffer = ""
    const response = await fetch("/analyze_fen", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fen })
    })
    readSSE(response,
    chunk => {
      const decoded = chunk.replace(/\|\|n\|\|/g, "\n")
      buffer += decoded
      const fixed = buffer.replace(/\n(\d+\.)/g, '\n\n$1')
      $("#fen-result").html(marked.parse(fixed))
    },
    () => {}
    )
})

  $("#btn-create").click(() => {
    $("#lobby-msg").text("创建中...")
    socket.emit("create_room", { time_control: getTimeControl(), color: selectedColor })
  })

  $("#btn-join").click(() => {
    const code = $("#room-input").val().trim().toUpperCase()
    if (!code) { $("#lobby-msg").text("请输入房间码"); return }
    socket.emit("join_room_code", { code })
  })

  $("#btn-quick").click(() => {
    $("#lobby-msg").text("等待匹配...")
    socket.emit("quick_match", { time_control: getTimeControl() })
  })

  $("#btn-home").click(() => {
    isTrainingMode = false
    gameStarted = false
    stockfishThinking = false
    stopClock()
    $("#game").hide()
    $("#lobby").css("display", "flex")
    $("#lobby-msg").text("")
  })

  socket.on("room_created", data => {
    $("#lobby-msg").text(`房间码：${data.code}，等待对手加入...`)
    showGame(data.code, data.color)
    $("#status").text("等待对手加入...")
  })

  socket.on("joined_room", data => {
    showGame(data.code, data.color)
  })

  socket.on("matched", data => {
    showGame(data.code, data.color)
  })

  socket.on("waiting", () => {
    $("#lobby-msg").text("等待对手中...")
  })

  socket.on("game_start", data => {
    gameStarted = true
    unlimited = data.unlimited
    increment = data.increment
    clocks.white = data.white_time
    clocks.black = data.black_time
    game.load(data.fen)
    board.position(game.fen())
    if (!unlimited) {
      $("#clock-row").show()
      updateClocks()
    }
    updateStatus()
    startClock()
  })

  socket.on("move_made", data => {
        game.load(data.fen)
        board.position(data.fen)
        lastMove = data.move
        clocks.white = data.white_time
        clocks.black = data.black_time
        updateStatus()
        if (data.game_over) {
            $("#status").text("游戏结束！")
            stopClock()
        } else {
            startClock(data.server_time)
        }
  })

  socket.on("timeout", data => {
    stopClock()
    gameStarted = false
    const loser = data.loser === "white" ? "白方" : "黑方"
    $("#status").text(`${loser}超时，游戏结束！`)
  })

  socket.on("opponent_left", () => {
    $("#status").text("对手已离开")
    gameStarted = false
    stopClock()
  })
  socket.on("opponent_disconnected", data => {
    $("#status").text(data.msg)
})

  socket.on("error", data => {
    if (gameStarted) $("#status").text(data.msg)
    else $("#lobby-msg").text(data.msg)
  })

  // 教练分析按钮
  // 训练模式：复盘整局
  // 学习/单人模式：实时分析当前局面
  $("#btn-analyze").click(async () => {
    if ($("#btn-analyze").prop("disabled")) return

    $("#loading").show()
    $("#analysis-box").html("")
    $("#review-hint").hide()

    // 训练模式复盘：把整局走法历史也传过去
    const fenToAnalyze = game.fen()
    const historyForReview = isTrainingMode
      ? moveHistory.map(m => m.uci).join(" → ")
      : null

    if (roomCode === "SOLO" || roomCode === "STOCKFISH") {
      let buffer = ""
      const response = await fetch("/analyze_fen", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            fen: fenToAnalyze,
            history: historyForReview,
            is_review: isTrainingMode
          })
      })
      $("#loading").hide()
      readSSE(response,
        chunk => {
          const decoded = chunk.replace(/\|\|n\|\|/g, "\n")
          buffer += decoded
          const fixed = buffer.replace(/\n(\d+\.)/g, '\n\n$1')
          $("#analysis-box").html(marked.parse(fixed))
        },
        () => {}
      )
    } else {
      socket.emit("analyze", { room: roomCode })
    }
  })

  let analysisBuffer = ""

  socket.on("analysis_chunk", data => {
    $("#loading").hide()
    analysisBuffer += data.text
    const fixed = analysisBuffer.replace(/\n(\d+\.)/g, '\n\n$1')
    $("#analysis-box").html(marked.parse(fixed))
})

  socket.on("analysis_done", () => {
      analysisBuffer = ""
  })

  socket.on("reconnected", data => {
      showGame(savedCode, savedColor)
      gameStarted = true
      unlimited = data.unlimited
      clocks.white = data.white_time
      clocks.black = data.black_time
      game.load(data.fen)
      board.position(data.fen)
      if (!unlimited) {
          $("#clock-row").show()
          updateClocks()
      }
      updateStatus()
      startClock()
      sessionStorage.removeItem("roomCode")
      sessionStorage.removeItem("myColor")
  })
</script>
</body>
</html>
